<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Photo Manager</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23b8472d'/%3E%3Ccircle cx='32' cy='32' r='16' fill='none' stroke='white' stroke-width='5'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card">
      <p class="eyebrow">PERSONAL ARCHIVE</p>
      <h1>Photo Manager</h1>
      <p class="login-intro">Sign in to view and tag your photo library.</p>
      <p id="login-error" class="login-error hidden" role="alert">
        That username or password didn’t match. Please try again.
      </p>
      <form action="/login" method="post" class="login-form">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" autofocus required>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button class="button" type="submit">Sign in</button>
      </form>
    </section>
  </main>
  <script>
    if (new URLSearchParams(window.location.search).has("error")) {
      document.getElementById("login-error").classList.remove("hidden");
    }
  </script>
</body>
</html>
